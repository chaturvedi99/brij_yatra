services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brijyatra
      POSTGRES_PASSWORD: brijyatra
      POSTGRES_DB: brijyatra
    ports:
      - "5433:5432"
    volumes:
      - brijyatra_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brijyatra -d brijyatra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  brijyatra_pg:
