# Railway: set Root Directory to this folder (brijyatra/apps/api).
# For the worker service, use the same root + Dockerfile but override Start Command to:
#   /usr/local/bin/worker
#
# Provision Postgres + Redis plugins and reference variables:
#   DATABASE_URL, REDIS_URL (inject into both API and Worker services)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/usr/local/bin/brijyatra_api"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
